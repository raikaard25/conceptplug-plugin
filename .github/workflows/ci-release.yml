name: Plugin CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
      - run: find . -type f -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
      - if: matrix.php == '8.3'
        run: chmod +x ./scripts/smoke-billing.sh && ./scripts/smoke-billing.sh
      - if: matrix.php == '8.3'
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction wp-coding-standards/wpcs:^3
          phpcs --standard=phpcs.xml.dist .
      - if: matrix.php == '8.3'
        run: chmod +x ./scripts/build-release-artifacts.sh && ./scripts/build-release-artifacts.sh
      - if: matrix.php == '8.3'
        id: version
        run: echo "value=$(sed -n 's/^ \* Version:[[:space:]]*//p' conceptplug.php | head -1)" >> "$GITHUB_OUTPUT"
      - if: matrix.php == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: conceptplug-release-${{ steps.version.outputs.value }}
          path: |
            public/downloads/conceptplug.zip
            public/downloads/conceptplug-update.json
            public/downloads/conceptplug.zip.sha256
            build/conceptplug-${{ steps.version.outputs.value }}.zip
            build/conceptplug-${{ steps.version.outputs.value }}.zip.sha256

  wordpress-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        wordpress: ['6.9.4', '7.0']
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: wordpress
          MARIADB_USER: wordpress
          MARIADB_PASSWORD: wordpress
          MARIADB_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3' }
      - run: |
          curl -fsSLo /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x /usr/local/bin/wp
          mkdir /tmp/wp && cd /tmp/wp
          wp core download --version=${{ matrix.wordpress }}
          wp config create --dbname=wordpress --dbuser=wordpress --dbpass=wordpress --dbhost=127.0.0.1
          wp core install --url=example.test --title=Test --admin_user=admin --admin_password=test --admin_email=admin@example.test --skip-email
          wp plugin install woocommerce --activate
          VERSION="$(sed -n 's/^ \* Version:[[:space:]]*//p' $GITHUB_WORKSPACE/conceptplug.php | head -1)"
          "$GITHUB_WORKSPACE/scripts/build-zip.sh" /tmp
          wp plugin install "/tmp/conceptplug-${VERSION}.zip" --activate
          wp plugin install plugin-check --activate
          wp plugin check conceptplug --format=csv | tee /tmp/plugin-check.csv
          ! grep -E ',"?(ERROR|WARNING)"?,' /tmp/plugin-check.csv

  publish-web-downloads:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-and-package, wordpress-compatibility]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "value=$(sed -n 's/^ \* Version:[[:space:]]*//p' conceptplug.php | head -1)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: conceptplug-release-${{ steps.version.outputs.value }}
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: chmod +x ./scripts/publish-downloads-to-web.sh && ./scripts/publish-downloads-to-web.sh
        env:
          GITHUB_TOKEN: ${{ secrets.CONCEPTPLUG_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          CONCEPTPLUG_VERCEL_DEPLOY_HOOK: ${{ secrets.CONCEPTPLUG_VERCEL_DEPLOY_HOOK }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-and-package, wordpress-compatibility]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "value=$(sed -n 's/^ \* Version:[[:space:]]*//p' conceptplug.php | head -1)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: conceptplug-release-${{ steps.version.outputs.value }}
          path: release
      - run: cp release/public/downloads/conceptplug.zip release/conceptplug.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/conceptplug.zip
            release/public/downloads/conceptplug.zip
            release/public/downloads/conceptplug-update.json
            release/public/downloads/conceptplug.zip.sha256
            release/build/conceptplug-${{ steps.version.outputs.value }}.zip
            release/build/conceptplug-${{ steps.version.outputs.value }}.zip.sha256
